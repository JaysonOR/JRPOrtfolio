<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Jayson</title>
<style>
  :root{
    --ink:#12151b;
    --panel:#1b1f27;
    --line:#2b3040;
    --paper:#e7e9ee;
    --paper-dim:#8a90a1;
    --signal:#7fe7c4;
    --warn:#f2b84b;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ink); color:var(--paper);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height:1.5;
  }
  .mono{font-family:'JetBrains Mono','Space Mono','Courier New',monospace;}
  body::before{
    content:""; position:fixed; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:48px 48px; opacity:0.15; pointer-events:none; z-index:0;
  }
  .wrap{max-width:860px; margin:0 auto; padding:0 24px; position:relative; z-index:1;}

  nav.topnav{display:flex; justify-content:space-between; align-items:center; padding:28px 0;}
  nav.topnav .brand{font-weight:700; font-size:15px;}
  nav.topnav a.back{
    color:var(--paper-dim); text-decoration:none; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px;
  }
  nav.topnav a.back:hover{color:var(--paper);}

  .badge{
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.08em;
    padding:4px 8px; border-radius:5px; text-transform:uppercase; margin-bottom:16px;
  }
  .badge.web{background:var(--signal); color:#0d1712;}
  .badge.game{background:var(--warn); color:#241a04;}

  .title-row{
    display:flex; justify-content:space-between; align-items:center;
    gap:20px; flex-wrap:wrap; margin-bottom:24px;
  }
  h1{font-size:clamp(28px,5vw,42px); margin:0; letter-spacing:-0.02em;}
  .btn{
    font-family:inherit; font-size:14px; font-weight:700;
    padding:11px 20px; border-radius:8px; text-decoration:none;
    white-space:nowrap;
    background:var(--signal); color:#0d1712; border:1px solid var(--signal);
    transition:background .15s ease, transform .15s ease;
  }
  .btn:hover{background:#94f2d2; transform:translateY(-1px);}

  .media{
    width:100%; aspect-ratio:16/9;
    background:repeating-linear-gradient(45deg, #232837, #232837 10px, #1e222c 10px, #1e222c 20px);
    border:1px solid var(--line); border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center;
    color:var(--paper-dim); font-size:14px; text-align:center; padding:16px;
    margin-bottom:40px; overflow:hidden;
  }
  .media img, .media video{width:100%; height:100%; object-fit:cover;}
  .media iframe{width:100%; height:100%; border:0;}

  section{margin-bottom:48px;}
  .section-label{
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--paper-dim); margin-bottom:16px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after{content:""; flex:1; height:1px; background:var(--line);}

  .summary{font-size:16px; color:var(--paper-dim); max-width:640px;}
  .summary p{margin:0 0 14px;}
  .summary p:last-child{margin-bottom:0;}

  .meta-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr));
    gap:16px;
  }
  .meta-item{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px;
  }
  .meta-item h4{
    margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--paper-dim);
  }
  .meta-item p{margin:0; font-size:15px; font-weight:600;}

  .role-title{font-size:15px; font-weight:700; color:var(--signal); margin:0 0 16px;}
  .resp-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px;}
  .resp-list li{
    display:flex; gap:12px; align-items:flex-start;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 18px; font-size:14px; color:var(--paper-dim);
  }
  .resp-list li::before{
    content:"›"; color:var(--signal); font-weight:700; font-size:16px; line-height:1.3;
  }

  footer{border-top:1px solid var(--line); padding:32px 0 60px; color:var(--paper-dim); font-size:13px;}
</style>
</head>
<body>

<div class="wrap">

  <nav class="topnav">
    <div class="brand mono">JAYSON.DEV</div>
    <a class="back" href="index.html">&larr; Back to projects</a>
  </nav>

  <div id="content">
    <!-- populated by script below -->
  </div>

  <footer>© 2026 Jayson.</footer>
</div>

<script>
  // ---- Project data: add/edit entries here, one object per project ----
  const projects = {
    "knight-at-the-library": {
      tag: "game",
      title: "Knight at the Library",
      media: "<iframe src=\"https://www.youtube.com/embed/cpHmCCDSUmw\" title=\"Knight at the Library\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen></iframe>",
      playUrl: "https://hypelocomotive.itch.io/knight-at-the-library",
      engine: "Unreal Engine",
      language: "Blueprints & C++",
      role: "Lead Programmer",
      summary: "<p>Knight at the Library is a tense first-person puzzle horror game set inside a library after hours. You play as a robber attempting to steal valuable artifacts but unknowingly disturb the vengeful spirit that haunts the halls. To survive, you must solve puzzles and return the stolen items—all while evading a relentless, possessed knight determined to stop you.</p><p>This project was developed during the Orlando Library Game Jam with a team of six other participants I had just met. Despite the short weekend timeframe, we created a thrilling horror experience that went on to win 3rd place overall in the jam.</p>",
      teamSize: "Team of 7",
      duration: "68-hour game jam",
      awards: "3rd Place — Orlando Library Game Jam",
      responsibilities: [
        "Translated game designers’ ideas and plans into a functional, scalable codebase",
        "Developed the core enemy AI systems to drive engaging gameplay",
        "Programmed and integrated all designer-planned puzzles, ensuring smooth functionality",
        "Collaborated with level designers to debug and resolve issues after code merges",
        "Managed programming tasks, delegating responsibilities based on team members’ strengths and project timelines",
        "Seamlessly integrated character models from the art team with the AI system, maintaining both technical accuracy and creative vision"
      ]
    },
    "retail-overflow": {
      tag: "game",
      title: "Retail Overflow",
      media: "<iframe src=\"https://www.youtube.com/embed/rR7XWctDlNg\" title=\"Retail Overflow\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen></iframe>",
      playUrl: "https://milkbagboii.itch.io/retail-overflow",
      engine: "Unreal Engine",
      language: "Blueprints & C++",
      role: "Game Designer, Programmer",
      summary: "<p>Retail Overflow is a fast-paced, hectic game where you play as the only employee on shift in a store overflowing with customers. Armed with your trusty broom, you must keep the aisles clean and maintain order—because if the mess piles up, the manager won’t be happy!</p><p>This project was created for Mini Jam #43, where the theme was Overflow and the required special item was a brush. Working with one teammate over just three days, we developed a chaotic cleaning simulator where sweeping and knocking customers out of the way becomes your key strategy. The game was later awarded 3rd place out of 64 entries.</p>",
      teamSize: "Team of 2",
      duration: "3-day game jam",
      awards: "3rd Place — Mini Jam #43 (out of 64 entries)",
      responsibilities: [
        "Designed and implemented customer AI, including pathfinding and interactive behaviors with the game world",
        "Optimized performance in an AI-heavy environment by adjusting rendering and AI processing for off-screen or distant characters",
        "Developed boss AI with a unique tolerance meter system, enhancing difficulty scaling and player immersion",
        "Designed and programmed the “bonk” mechanic, allowing AI to be dynamically knocked away by the player",
        "Built and implemented all in-game UI systems, ensuring clarity and player accessibility"
      ]
    },
    "jester-dice": {
      tag: "game",
      title: "Jester Dice",
      media: "<iframe src=\"https://www.youtube.com/embed/rlZ79GrSq4Y\" title=\"Jester Dice\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen></iframe>",
      playUrl: "https://milkbagboii.itch.io/jesters-dice",
      engine: "Godot",
      language: "GDScript",
      role: "Game Designer, Programmer, UI Designer",
      summary: "<p>Jester Dice is a Balatro-inspired dice game where you roll up to five dice each round to build your score and push your luck. Unlock unique Action Cards that multiply points on specific rolls, strategically freeze dice to set up combos, and test your skills to survive all 20 challenging rounds.</p><p>This project was originally created for the Brackeys Game Jam 2025.2, where the theme was Risk it for the Biscuit. Working with one teammate over seven days, we set out to design a gambling-inspired game with a dice-driven twist. Following the jam, we decided to continue development—adding new mechanics, polishing gameplay, and fixing bugs to bring the project closer to our full vision.</p>",
      teamSize: "Team of 2",
      duration: "7-day game jam, with post-jam development",
      awards: "—",
      responsibilities: [
        "Designed and wireframed the main HUD UI, ensuring clarity, usability, and smooth functionality",
        "Developed and implemented the Freeze mechanic, adding strategic depth to gameplay",
        "Collaborated with game designers to brainstorm improvements to the base game and translated their ideas into new features and mechanics",
        "Debugged and resolved issues identified during initial playtesting, improving stability and player experience",
        "Worked within a prebuilt game framework to build and integrate new mechanics that enhanced overall game flow"
      ]
    },
    "pookie-puca": {
      tag: "game",
      title: "Pookie Puca",
      media: "<img src=\"images/pookie-puca-thumb.png\" alt=\"Pookie Puca key art\">",
      playUrl: "https://pookiepuca.itch.io/pookie-puca",
      engine: "Unreal Engine",
      language: "Blueprints",
      role: "Scripting & Programmer",
      summary: "<p>Pookie Puca is a short narrative-driven, comedic horror game that involves puzzles, minigames, and cinematic shots. Help Pookie get away with murder and claim his grand prize of being financially stable.</p><p>This project was built for Scream Jam 2025 with a team of nine.</p>",
      teamSize: "Team of 9",
      duration: "—",
      awards: "—",
      responsibilities: [
        "Served as lead programmer, implementing basic interaction functionality throughout the game",
        "Designed and built the UI-based puzzle minigames",
        "Built the dialogue system"
      ]
    },
    "untitled-fighter": {
      tag: "game",
      title: "Untitled Fighter",
      media: "<iframe src=\"https://www.youtube.com/embed/ol3Ogy-Yx_k\" title=\"Untitled Fighter\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen></iframe>",
      playUrl: "https://bubbacandy.itch.io/untitled-fighter",
      engine: "Unreal Engine",
      language: "Blueprints",
      role: "Combat Designer, Programmer",
      summary: "<p>Untitled Fighter is a fast-paced couch 1v1 dueling game where you and a friend battle as knights armed with nothing but your sword, your skill—and a single bullet. Every attack can be parried, even bullets, but caution is key: with only one round in the chamber, the only way to reload is to get up close and personal.</p><p>This project was developed as a one-month passion project with one collaborator, aimed at experimenting with combat systems. Inspired by classic 2D fighters and Souls-like parry mechanics, we merged the two genres with the unique twist of a one-in-the-chamber system. This was also our first attempt at implementing local couch play, expanding our skills in multiplayer design.</p>",
      teamSize: "Team of 2",
      duration: "1-month passion project",
      awards: "—",
      responsibilities: [
        "Designed and developed the combat system, ensuring responsive and engaging player interactions",
        "Programmed the player state machine and implemented a parry system to add depth to combat mechanics",
        "Integrated and synchronized animations with the state machine for smooth and natural player movement",
        "Developed the round system, handling flow and structure of gameplay sessions",
        "Designed and programmed the gunshot mechanic, balancing technical functionality with gameplay feel"
      ]
    },
    "project-cargo": {
      tag: "game",
      title: "Project Cargo",
      media: "<img src=\"images/project-cargo-thumb.png\" alt=\"Project Cargo key art\">",
      playUrl: "https://milkbagboii.itch.io/project-cargo",
      engine: "Unreal Engine",
      language: "Blueprints",
      role: "Gameplay & AI Programmer",
      summary: "<p>Project Cargo is a sci-fi horror demo where you explore the remains of a space vessel that's been taken over by a foreign alien, trying to survive while hiding and running for your life.</p><p>This project was built for Scream Jam 2024 over one month with a team of two.</p>",
      teamSize: "Team of 2",
      duration: "1-month game jam",
      awards: "—",
      responsibilities: [
        "Created the main functionality of the AI and its states",
        "Created hiding spots inside vents",
        "Created the dialogue and game loop"
      ]
    },
    "ai-canopy": {
      tag: "web",
      title: "AI Canopy",
      media: "<img src=\"images/Microsoft-Azure.webp\" alt=\"AI Canopy\">",
      engine: "React / ASP.NET Core",
      language: "JavaScript & C#",
      role: "e.g. Software Engineer Intern",
      summary: "An internal dashboard that discovers and visualizes AI models deployed across an organization's Azure subscriptions.",
      teamSize: "Team of 2",
      duration: "Ongoing internship project",
      awards: "—",
      responsibilities: [
        "Built React frontend components for the dashboard views",
        "Worked on the C#/ASP.NET Core backend aggregating Azure API data",
        "Designed the proxy/aggregator pattern for pulling model data across subscriptions"
      ]
    }
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get('project');
  const data = projects[id];
  const content = document.getElementById('content');

  if(!data){
    content.innerHTML = `<h1>Project not found</h1><p class="summary">Check the link, or head back to <a href="portfolio.html" style="color:var(--signal)">the project list</a>.</p>`;
  } else {
    content.innerHTML = `
      <span class="badge ${data.tag}">${data.tag}</span>

      <div class="title-row">
        <h1>${data.title}</h1>
        ${data.playUrl ? `<a class="btn" href="${data.playUrl}" target="_blank" rel="noopener">Play Game →</a>` : ''}
      </div>

      <div class="media">${data.media}</div>

      <section>
        <div class="section-label">Summary</div>
        <div class="summary">${data.summary}</div>
      </section>

      <section>
        <div class="section-label">Project info</div>
        <div class="meta-grid">
          <div class="meta-item"><h4>Engine</h4><p>${data.engine}</p></div>
          <div class="meta-item"><h4>Language</h4><p>${data.language}</p></div>
          <div class="meta-item"><h4>Team size</h4><p>${data.teamSize}</p></div>
          ${data.duration && data.duration !== '—' ? `<div class="meta-item"><h4>Duration</h4><p>${data.duration}</p></div>` : ''}
          ${data.awards && data.awards !== '—' ? `<div class="meta-item"><h4>Awards</h4><p>${data.awards}</p></div>` : ''}
        </div>
      </section>

      <section>
        <div class="section-label">My responsibilities</div>
        <p class="role-title">${data.role}</p>
        <ul class="resp-list">
          ${data.responsibilities.map(r => `<li>${r}</li>`).join('')}
        </ul>
      </section>
    `;
  }
</script>

</body>
</html>
