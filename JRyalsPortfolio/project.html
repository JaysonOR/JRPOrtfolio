<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Jayson</title>
<style>
  :root{
    --ink:#12151b;
    --panel:#1b1f27;
    --line:#2b3040;
    --paper:#e7e9ee;
    --paper-dim:#8a90a1;
    --signal:#7fe7c4;
    --warn:#f2b84b;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ink); color:var(--paper);
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height:1.5;
  }
  .mono{font-family:'JetBrains Mono','Space Mono','Courier New',monospace;}
  body::before{
    content:""; position:fixed; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:48px 48px; opacity:0.15; pointer-events:none; z-index:0;
  }
  .wrap{max-width:860px; margin:0 auto; padding:0 24px; position:relative; z-index:1;}

  nav.topnav{display:flex; justify-content:space-between; align-items:center; padding:28px 0;}
  nav.topnav .brand{font-weight:700; font-size:15px;}
  nav.topnav a.back{
    color:var(--paper-dim); text-decoration:none; font-size:14px; font-weight:600;
    display:inline-flex; align-items:center; gap:6px;
  }
  nav.topnav a.back:hover{color:var(--paper);}

  .badge{
    display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.08em;
    padding:4px 8px; border-radius:5px; text-transform:uppercase; margin-bottom:16px;
  }
  .badge.web{background:var(--signal); color:#0d1712;}
  .badge.game{background:var(--warn); color:#241a04;}

  h1{font-size:clamp(28px,5vw,42px); margin:0 0 24px; letter-spacing:-0.02em;}

  .media{
    width:100%; aspect-ratio:16/9;
    background:repeating-linear-gradient(45deg, #232837, #232837 10px, #1e222c 10px, #1e222c 20px);
    border:1px solid var(--line); border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center;
    color:var(--paper-dim); font-size:14px; text-align:center; padding:16px;
    margin-bottom:40px; overflow:hidden;
  }
  .media img, .media video{width:100%; height:100%; object-fit:cover;}

  section{margin-bottom:48px;}
  .section-label{
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--paper-dim); margin-bottom:16px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after{content:""; flex:1; height:1px; background:var(--line);}

  .summary{font-size:16px; color:var(--paper-dim); max-width:640px;}

  .meta-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr));
    gap:16px;
  }
  .meta-item{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 18px;
  }
  .meta-item h4{
    margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--paper-dim);
  }
  .meta-item p{margin:0; font-size:15px; font-weight:600;}

  .resp-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px;}
  .resp-list li{
    display:flex; gap:12px; align-items:flex-start;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 18px; font-size:14px; color:var(--paper-dim);
  }
  .resp-list li::before{
    content:"›"; color:var(--signal); font-weight:700; font-size:16px; line-height:1.3;
  }

  footer{border-top:1px solid var(--line); padding:32px 0 60px; color:var(--paper-dim); font-size:13px;}
</style>
</head>
<body>

<div class="wrap">

  <nav class="topnav">
    <div class="brand mono">JAYSON.DEV</div>
    <a class="back" href="portfolio.html">&larr; Back to projects</a>
  </nav>

  <div id="content">
    <!-- populated by script below -->
  </div>

  <footer>© 2026 Jayson.</footer>
</div>

<script>
  // ---- Project data: add/edit entries here, one object per project ----
  const projects = {
    "npc-model-swap": {
      tag: "game",
      title: "NPC Model-Swap System",
      media: "[ Drop gameplay clip / gif here ]",
      summary: "Runtime character reassignment via skinned mesh swapping, so a single NPC rig can wear any character model without breaking animation.",
      teamSize: "Solo",
      duration: "e.g. 3 weeks",
      awards: "—",
      responsibilities: [
        "Designed the skinned mesh swap pipeline to preserve animation rigging across models",
        "Built tooling to preview model swaps in-editor",
        "Debugged rig mismatches between differently-proportioned character models"
      ]
    },
    "ragdoll-navmesh": {
      tag: "game",
      title: "Ragdoll & NavMesh Playground",
      media: "[ Drop gameplay clip / gif here ]",
      summary: "Tuned ragdoll physics and NavMesh agent behavior for believable NPC death and movement reactions.",
      teamSize: "Solo",
      duration: "e.g. 2 weeks",
      awards: "—",
      responsibilities: [
        "Tuned joint physics for believable ragdoll transitions on death",
        "Configured NavMesh agents for pathing around dynamic obstacles",
        "Resolved edge cases where ragdolls clipped through terrain"
      ]
    },
    "pickup-camera": {
      tag: "game",
      title: "Pickup & Camera Mechanics",
      media: "[ Drop gameplay clip / gif here ]",
      summary: "Bobbing/spinning collectible pickups and camera-relative character movement, the small-feel systems that make a game readable to play.",
      teamSize: "Solo",
      duration: "e.g. 1 week",
      awards: "—",
      responsibilities: [
        "Implemented bobbing/spinning animation for collectible pickups",
        "Built camera-relative movement so controls stay intuitive from any angle",
        "Playtested and iterated on feel/timing"
      ]
    },
    "azure-dashboard": {
      tag: "web",
      title: "Azure AI Model Dashboard",
      media: "[ Add screenshot here ]",
      summary: "An internal dashboard that discovers and visualizes AI models deployed across an organization's Azure subscriptions.",
      teamSize: "e.g. Intern team of X",
      duration: "Ongoing internship project",
      awards: "—",
      responsibilities: [
        "Built React frontend components for the dashboard views",
        "Worked on the C#/ASP.NET Core backend aggregating Azure API data",
        "Designed the proxy/aggregator pattern for pulling model data across subscriptions"
      ]
    },
    "movie-watchlist-api": {
      tag: "web",
      title: "Movie Watchlist API",
      media: "[ Add screenshot here ]",
      summary: "A Flask API for tracking a personal movie watchlist, built as a hands-on exercise in REST fundamentals.",
      teamSize: "Solo",
      duration: "e.g. 1 week",
      awards: "—",
      responsibilities: [
        "Designed REST endpoints for CRUD operations on watchlist entries",
        "Handled request validation and error responses",
        "Tested endpoints with Postman"
      ]
    }
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get('project');
  const data = projects[id];
  const content = document.getElementById('content');

  if(!data){
    content.innerHTML = `<h1>Project not found</h1><p class="summary">Check the link, or head back to <a href="portfolio.html" style="color:var(--signal)">the project list</a>.</p>`;
  } else {
    content.innerHTML = `
      <span class="badge ${data.tag}">${data.tag}</span>
      <h1>${data.title}</h1>

      <div class="media">${data.media}</div>

      <section>
        <div class="section-label">Summary</div>
        <p class="summary">${data.summary}</p>
      </section>

      <section>
        <div class="section-label">Project info</div>
        <div class="meta-grid">
          <div class="meta-item"><h4>Team size</h4><p>${data.teamSize}</p></div>
          <div class="meta-item"><h4>Duration</h4><p>${data.duration}</p></div>
          <div class="meta-item"><h4>Awards</h4><p>${data.awards}</p></div>
        </div>
      </section>

      <section>
        <div class="section-label">My responsibilities</div>
        <ul class="resp-list">
          ${data.responsibilities.map(r => `<li>${r}</li>`).join('')}
        </ul>
      </section>
    `;
  }
</script>

</body>
</html>
